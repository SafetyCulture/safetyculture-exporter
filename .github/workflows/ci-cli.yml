---
name: CLI CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'cli/**'
      - 'go.work'
      - 'go.work.sum'
      - '.github/workflows/ci-cli.yml'
      - '.pre-commit-config.yaml'

jobs:
  unit-tests:
    name: CLI Unit Tests
    runs-on: ubuntu-latest
    env:
      GOWORK: off
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Run unit tests
        working-directory: cli
        run: go test ./...

  pre-commit:
    name: CLI Pre-commit Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Set up Python
        uses: actions/setup-python@v5

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

  govulncheck:
    name: CLI Vulnerability Check
    runs-on: ubuntu-latest
    env:
      GOWORK: off
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck on CLI module
        working-directory: cli
        run: govulncheck ./...

  postgres-integration:
    name: PostgreSQL Integration Tests
    runs-on: ubuntu-latest
    env:
      GOWORK: off
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_DB: safetyculture_exporter_db
          POSTGRES_USER: safetyculture_exporter
          POSTGRES_PASSWORD: safetyculture_exporter
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Run PostgreSQL integration tests
        working-directory: cli
        env:
          TEST_DB_DIALECT: postgres
          TEST_DB_CONN_STRING: "postgresql://safetyculture_exporter:safetyculture_exporter@localhost:5432/safetyculture_exporter_db"
        run: go test ./... -tags=sql

  mysql-integration:
    name: MySQL 8 Integration Tests
    runs-on: ubuntu-latest
    env:
      GOWORK: off
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: safetyculture_exporter
          MYSQL_DATABASE: safetyculture_exporter_db
          MYSQL_USER: safetyculture_exporter
          MYSQL_PASSWORD: safetyculture_exporter
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 3306:3306
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Run MySQL integration tests
        working-directory: cli
        env:
          TEST_DB_DIALECT: mysql
          TEST_DB_CONN_STRING: "root:safetyculture_exporter@tcp(localhost:3306)/safetyculture_exporter_db?charset=utf8mb4&parseTime=True&loc=Local"
        run: go test ./... -tags=sql

  sqlserver-integration:
    name: SQL Server Integration Tests
    runs-on: ubuntu-latest
    env:
      GOWORK: off
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server
        env:
          SA_PASSWORD: "SafetyCultureExporter12345"
          ACCEPT_EULA: "Y"
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P SafetyCultureExporter12345 -Q \"SELECT 1\" || exit 1"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 20
        ports:
          - 1433:1433
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Run SQL Server integration tests
        working-directory: cli
        env:
          TEST_DB_DIALECT: sqlserver
          TEST_DB_CONN_STRING: "sqlserver://sa:SafetyCultureExporter12345@localhost:1433?database=master"
        run: go test ./... -tags=sql

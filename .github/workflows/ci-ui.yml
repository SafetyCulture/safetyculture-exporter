---
name: UI CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'ui/**'
      - 'go.work'
      - 'go.work.sum'
      - '.github/workflows/ci-ui.yml'

jobs:
  unit-tests:
    name: UI Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Run UI Go tests
        working-directory: ui
        run: go test ./...

  build-smoke-test:
    name: Wails Build Smoke Test
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: ui/frontend/pnpm-lock.yaml

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build UI
        working-directory: ui
        run: wails build -platform darwin/universal -clean

  govulncheck:
    name: UI Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.9'

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck on UI module
        working-directory: ui
        run: govulncheck ./...
